<!DOCTYPE HTML>
<html>
    <head>
        <title>Connect with Muhammad Huzaifa</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        
        <style>
            /* Reset & Base Styles */
            body, html {
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #0f172a;
                color: #ffffff;
                height: 100%;
            }

            /* Main Banner - Updated Contact Theme Image */
            #banner {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                /* New Contact/Communication themed background */
                background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), url('https://images.unsplash.com/photo-1423666639041-f56000c27a9a?q=80&w=2074&auto=format&fit=crop');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                padding: 2rem;
            }

            /* Mobile optimization for background */
            @media screen and (max-width: 980px) {
                #banner {
                    background-attachment: scroll !important;
                    padding: 1rem;
                }
            }

            /* Content Card - Widened to accommodate Calendly */
            .inner-card {
                background: rgba(30, 41, 59, 0.85);
                backdrop-filter: blur(12px);
                padding: 3rem 2rem;
                border-radius: 15px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                max-width: 800px; /* Increased width for calendar */
                width: 100%;
                opacity: 0;
                transform: translateY(30px);
                animation: fadeUp 1s ease forwards;
            }

            @keyframes fadeUp {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            h1 {
                font-size: 2.2rem;
                margin-bottom: 0.5rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
            }

            p.subtitle {
                color: #94a3b8;
                font-size: 1.1rem;
                margin-bottom: 2rem;
                line-height: 1.6;
            }

            /* Contact Details */
            .contact-info {
                margin-bottom: 1.5rem;
                font-size: 1.1rem;
            }

            .contact-info a {
                color: #20beff;
                text-decoration: none;
                font-weight: bold;
                transition: color 0.3s ease;
            }

            .contact-info a:hover {
                color: #ffffff;
            }

            /* Social Links */
            .social-links {
                list-style: none;
                padding: 0;
                margin: 0 0 2rem 0;
                display: flex;
                justify-content: center;
                gap: 20px;
            }

            .social-links li a {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 45px;
                height: 45px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.05);
                color: #ffffff;
                font-size: 1.2rem;
                text-decoration: none;
                transition: all 0.3s ease;
            }

            .social-links li a.linkedin:hover { background: #0077b5; transform: translateY(-3px); }
            .social-links li a.github:hover { background: #333333; transform: translateY(-3px); }
            .social-links li a.kaggle:hover { background: #20beff; transform: translateY(-3px); }

            /* Calendly Container Styling */
            .calendly-container {
                background: #ffffff;
                border-radius: 10px;
                overflow: hidden;
                margin-top: 1rem;
            }
        </style>
    </head>
    <body>

        <section id="banner">
            <div class="inner-card">
                <h1>Let's Connect</h1>
                <p class="subtitle">Ready to transform your raw data into strategic business value? Reach out directly or book a time below.</p>
                
                <div class="contact-info">
                    <p><i class="fa-solid fa-envelope" style="margin-right: 10px;"></i> <a href="mailto:huzaifagohar921@gmail.com">huzaifagohar921@example.com</a></p>
                </div>

                <ul class="social-links">
                    <li><a href="https://www.linkedin.com/in/muhammad-huzaifa-gohar/" class="linkedin" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a></li>
                    <li><a href="https://github.com/MuhammadHuzaifaGohar" class="github" title="GitHub"><i class="fa-brands fa-github"></i></a></li>
                    <li><a href="https://www.kaggle.com/muhammadhuzaifagohar/code" class="kaggle" title="Kaggle"><i class="fa-brands fa-kaggle"></i></a></li>
                </ul>

                <div class="calendly-container">
                    <div class="calendly-inline-widget" data-url="https://calendly.com/YOUR_CALENDLY_LINK_HERE" style="min-width:320px;height:630px;"></div>
                    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
                </div>
                </div>
        </section>

    </body>
</html>
